# NeuroRegen — Pulsed TMS capacitor-discharge configuration
#
# 3-coil sweet spot: 798V / 10Hz / single 110V/20A outlet
#
# Physics baseline:
#   L  ≈  9.5 µH  (Neumann formula, single loop ≈ 0.26 µH, ×N² = ×36)
#   I_peak ≈ 3 674 A     (V √(C/L))
#   τ  ≈  137 µs         (π √(LC))
#   E_pulse ≈ 63.8 J     (½ C V²  per coil)
#   f_max ≈ 9.8 Hz       (3 coils × 63.8 J / (2 200 W × 0.85))
#   Cortex E ≈ 150 V/m   (at safety limit — maximum safe per-pulse field)
#   STN E   ≈ 18.5 V/m   (r=20mm, 3 coils superposed)

# --- Stimulation target ---------------------------------------------------
target:
  name: STN_left
  position_m: [-0.012, -0.013, -0.040]

# --- Safety thresholds ----------------------------------------------------
safety:
  cortical_max_vm: 150.0       # max allowed E-field at cortex (V/m)
  scalp_to_cortex_m: 0.015     # scalp + skull thickness (m)

# --- Capacitor bank -------------------------------------------------------
capacitor:
  capacitance_f: 200.0e-6      # 200 µF (per coil, independently switched)
  charge_voltage_v: 798.0      # 0.8 kV — sweet spot: cortex at 150 V/m

# --- Coil array -----------------------------------------------------------
# 3 coils on skull surface, all 150mm / 6-turn / 10mm wire.
# Distances to STN_left:
#   Coil A (vertex)     ≈ 12.8 cm
#   Coil B (lateral R)  ≈ 11.7 cm
#   Coil C (posterior)  ≈  9.3 cm
coils:
  - name: A
    wire_mm: 10.0
    loop_mm: 150.0
    turns: 6
    pulse_power_w: 0
    position_m: [-0.010, -0.010, 0.088]
    normal: [-0.016, -0.023, -1.000]

  - name: B
    wire_mm: 10.0
    loop_mm: 150.0
    turns: 6
    pulse_power_w: 0
    position_m: [0.085, -0.020, 0.025]
    normal: [-0.829, 0.060, -0.556]

  - name: C
    wire_mm: 10.0
    loop_mm: 150.0
    turns: 6
    pulse_power_w: 0
    position_m: [-0.015, -0.088, 0.015]
    normal: [0.032, 0.806, -0.591]

# --- Simulation -----------------------------------------------------------
simulation:
  n_pulses: 600                # 60 seconds at 10 Hz
  pulse_freq: 10.0             # 10 Hz — standard facilitatory rTMS
  dt_between_pulses: 0.001     # cooling integration step between pulses (s)

# --- Thermal limits -------------------------------------------------------
thermal:
  h_conv: 10.0                 # convective coefficient (W/m²/K)
  t_amb_c: 22.0                # ambient temperature (°C)
  temp_limit_f: 105.0          # coil temperature limit (°F) — IEC 60601-1 skin contact limit (~40.6 °C)
  hyst_f: 1.5
  r_tissue_m: 0.005            # effective tissue loop radius for E-field (m)
