# NeuroRegen — External B-field simulator configuration
#
# Mirrors the working ANSYS Maxwell 3-axis TMS build:
#   3AxisTeslaCoil_6Turns_10mmWire_150mmLargest_SeparateLeads_300mm_Apr15.aedt
#
# All lengths in METRES, currents in AMPERES, B-field outputs in TESLA.
# Coordinate frame: head-centred (origin = geometric centre of skull).

# -- Head mesh ---------------------------------------------------------------
mesh:
  # Replace with your SimNIBS export. Accepts .stl, .ply, .vtk, .msh, .obj.
  # Path is relative to this config file (or absolute).
  path: "head_models/skin.stl"
  # If the mesh was exported in millimetres, set scale_to_m: 0.001
  scale_to_m: 1.0
  # Optional rigid offset (m) applied AFTER scaling, in case the SimNIBS
  # mesh origin doesn't coincide with the head centre used for the coils.
  translate_m: [0.0, 0.0, 0.0]

# -- Stimulation target -----------------------------------------------------
target:
  name: STN_left
  position_m: [-0.012, -0.013, -0.040]

# -- Coil array --------------------------------------------------------------
# 3-axis Tesla coil — three orthogonal helices sharing the head centre.
# Matches the validated Maxwell3D build CoilX_Helix / CoilY_Helix /
# CoilZ_Helix (memory: 2026-04-27 working state).
#
#   shared center  : (0, 0, 0)   — head centre
#   axes           : X̂ , Ŷ , Ẑ  — mutually orthogonal
#   per coil       : 6 turns, 10 mm wire, 150 mm loop, helix height 35.7 mm
#   peak current   : 3 674 A      (per coil, independently switched)
#
# geometry:
#   "stacked"  — N planar circular loops along the coil axis (idiomatic
#                magpylib, uses the closed-form Ortner-2022 Circle field;
#                fastest, most accurate, no near-wire singularities).
#   "helix"    — true 3-D helical Polyline (matches Maxwell wire path
#                visually; slower; useful for ANSYS-equivalence checks).
#
# peak_dIdt_a_per_us:
#   Maximum |dI/dt| in A/μs. Used for downstream E-field reporting only
#   (E ∝ dI/dt). For a half-sine LC pulse, peak dI/dt ≈ I_peak·π/τ.
#   3 674 A × π / 137 µs ≈ 84.3 A/μs for the validated build.
coils:
  - name: X           # winds in YZ plane, B-field axis along x̂
    loop_diameter_m: 0.150
    wire_diameter_m: 0.010
    turns: 6
    helix_height_m: 0.0357
    segments_per_turn: 64
    current_a: 3674.0
    peak_dIdt_a_per_us: 84.3
    geometry: "stacked"
    position_m: [0.0, 0.0, 0.0]
    normal:     [1.0, 0.0, 0.0]

  - name: Y           # winds in XZ plane, B-field axis along ŷ
    loop_diameter_m: 0.150
    wire_diameter_m: 0.010
    turns: 6
    helix_height_m: 0.0357
    segments_per_turn: 64
    current_a: 3674.0
    peak_dIdt_a_per_us: 84.3
    geometry: "stacked"
    position_m: [0.0, 0.0, 0.0]
    normal:     [0.0, 1.0, 0.0]

  - name: Z           # winds in XY plane, B-field axis along ẑ
    loop_diameter_m: 0.150
    wire_diameter_m: 0.010
    turns: 6
    helix_height_m: 0.0357
    segments_per_turn: 64
    current_a: 3674.0
    peak_dIdt_a_per_us: 84.3
    geometry: "stacked"
    position_m: [0.0, 0.0, 0.0]
    normal:     [0.0, 0.0, 1.0]

# -- Observation grid (3-D ImageData around the head) ------------------------
grid:
  # AABB of the volume to compute B over, in metres
  bounds_m:
    xmin: -0.13
    xmax:  0.13
    ymin: -0.13
    ymax:  0.13
    zmin: -0.10
    zmax:  0.13
  # Voxel resolution (m). 5 mm gives ~125k voxels for a 25 cm cube — fast.
  spacing_m: 0.005

# -- Visualisation -----------------------------------------------------------
viz:
  head_opacity: 0.25
  coil_color: "orange"
  log_color_scale: true            # B-magnitude spans many decades
  streamline_density: 200          # number of streamline seeds
  streamline_max_steps: 4000
  slice_planes: ["x", "y", "z"]    # orthogonal slices through target
  show_target_marker: true
  background: "white"

# -- Safety / standoff -------------------------------------------------------
# Skin-distance check, after SimNIBS convention:
#   skin_offset_m  – intended air gap from coil surface to scalp (default
#                    4 mm — SimNIBS default, accounts for hair). Set to 0
#                    if your CAD coordinates already sit on the scalp.
#   tolerance_m    – allowed deviation; outside ±tolerance the coil is
#                    flagged TOO_CLOSE / TOO_FAR / INSIDE.
safety:
  skin_offset_m: 0.004
  tolerance_m: 0.003
  intersection_sample_points: 256
